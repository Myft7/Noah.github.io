<!DOCTYPE html>
<html>
<head>
<title>PNR Motorsport</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family:'Inter', sans-serif;
  color:white;
  background:
  radial-gradient(circle at 30% 20%, rgba(59,91,255,0.2), transparent),
  radial-gradient(circle at 70% 80%, rgba(0,255,136,0.1), transparent),
  #020617;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:rgba(2,6,23,0.7);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:30px;
}

nav ul{
  display:flex;
  gap:30px;
  list-style:none;
}

nav li{
  cursor:pointer;
}

/* DISCORD LIVE */
.discord{
  font-size:12px;
  color:#00ff88;
}

/* JOIN */
.join{
  padding:10px 20px;
  background:linear-gradient(90deg,#3b5bff,#00ff88);
  border-radius:6px;
  text-decoration:none;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.hero h1{
  font-size:90px;
  animation:fadeUp 1s;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(-50px);}
  to{opacity:1;}
}

/* PNR */
.pnr{
  background:linear-gradient(90deg,#3b5bff,#00ff88);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TEAM */
.team-section{
  padding:100px 20px;
  text-align:center;
}

.team-grid{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.team-box{
  width:260px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:10px;
  transition:0.3s;
  cursor:pointer;
}

.team-box:hover{
  transform:scale(1.05);
}

/* TAG */
.tag{
  margin-top:10px;
  font-size:11px;
  border:1px solid white;
  display:inline-block;
  padding:3px 8px;
}

/* POPUP DRIVER */
.popup{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#111827;
  padding:40px;
  border-radius:10px;
  width:300px;
}

/* STATS */
.stat{
  margin-top:10px;
}

.bar{
  height:6px;
  background:#222;
  margin-top:3px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#3b5bff,#00ff88);
}

/* FOOTER */
footer{
  padding:60px;
  display:flex;
  justify-content:space-around;
}

footer a{
  color:white;
  opacity:0.6;
  text-decoration:none;
}

footer a:hover{
  opacity:1;
}

</style>
</head>

<body>

<nav>

<div><b>PNR MOTORSPORT</b></div>

<div class="nav-right">

<div class="discord">● 96 ONLINE • 480 MEMBERS</div>

<a class="join" href="https://discord.gg/TXhqstemqD">JOIN NOW</a>

<ul>
<li onclick="go('home')">HOME</li>
<li onclick="go('teams')">TEAM</li>
<li onclick="go('contact')">CONTACT</li>
</ul>

</div>

</nav>

<!-- HERO -->
<div class="hero" id="home">
<h1><span class="pnr">PNR</span> MOTORSPORT</h1>
<p>Simracing Team</p>
</div>

<!-- TEAM -->
<section class="team-section" id="teams">

<h2>TEAM</h2>

<div class="team-grid">

<div class="team-box" onclick="openDriver()">
Team 1
<div class="tag">GT3</div>
</div>

<div class="team-box" onclick="openDriver()">
Team 2
<div class="tag">GT3</div>
</div>

<div class="team-box" onclick="openDriver()">
Team 3
<div class="tag">GT3</div>
</div>

<div class="team-box" onclick="openDriver()">
Team 4 [Academy]
<div class="tag">GT3</div>
</div>

</div>

</section>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="popup-box">

<h2>Driver Name</h2>

<div class="stat">
Wins
<div class="bar"><div class="fill" style="width:70%"></div></div>
</div>

<div class="stat">
Laps
<div class="bar"><div class="fill" style="width:90%"></div></div>
</div>

<div class="stat">
Pace
<div class="bar"><div class="fill" style="width:80%"></div></div>
</div>

<br>

<button onclick="closeDriver()">Close</button>

</div>

</div>

<!-- FOOTER -->
<footer>

<div>
<h3>Social</h3>
<a href="https://discord.gg/TXhqstemqD">Discord</a>
<a href="#">Instagram</a>
<a href="#">TikTok</a>
</div>

<div>
<h3>Notes</h3>
<p>© 2026 PNR Motorsport</p>
</div>

</footer>

<script>

function go(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* DRIVER POPUP */
function openDriver(){
document.getElementById("popup").style.display="flex";
}

function closeDriver(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
